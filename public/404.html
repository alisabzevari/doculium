<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Doculium</title>
    <script>
      (function() {
        const base = '/doculium/';
        const path = location.pathname.replace(base, '/');
        if (path !== '/') {
          sessionStorage.setItem('redirect', location.href);
          location.replace(base);
        }
      })();
    </script>
  </head>
  <body>
    <a href="/doculium/">Go to Doculium</a>
  </body>
</html>
